<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.body.innerHTML += `<div style="color:red; background:white; padding:20px; z-index:9999; position:absolute; top:0;"><h1>Console Error:</h1><pre>${msg}</pre><pre>${error ? error.stack : ''}</pre></div>`;
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += `<div style="color:red; background:white; padding:20px; z-index:9999; position:absolute; top:0;"><h1>Unhandled Promise Rejection:</h1><pre>${event.reason}</pre></div>`;
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
